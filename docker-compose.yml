services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-landing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landing}
      POSTGRES_DB: ${POSTGRES_DB:-landing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landing} -d ${POSTGRES_DB:-landing}"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini
      - ./backend/app:/code/app

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/app:/code/app   # hot reload в dev
      - ./backend/tests:/code/tests
      - ./backend/pytest.ini:/code/pytest.ini
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini

  celery_worker:
    build: ./backend
    command: celery -A app.shared.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/app:/code/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/code/src
      - ./frontend/index.html:/code/index.html

volumes:
  pgdata:
