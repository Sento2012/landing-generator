services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-landing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-landing}
      POSTGRES_DB: ${POSTGRES_DB:-landing}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-landing} -d ${POSTGRES_DB:-landing}"]
      interval: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"       # AMQP
      - "15672:15672"     # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"       # SMTP
      - "8025:8025"       # web UI

  migrate:
    build: ./backend
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini
      - ./backend/app:/code/app

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-30}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@landing-generator.local}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/app:/code/app   # hot reload в dev
      - ./backend/worker:/code/worker
      - ./backend/tests:/code/tests
      - ./backend/pytest.ini:/code/pytest.ini
      - ./backend/alembic:/code/alembic
      - ./backend/alembic.ini:/code/alembic.ini

  celery_worker:
    build: ./backend
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2 -Q generations
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend/app:/code/app
      - ./backend/worker:/code/worker

  ws:
    build: ./backend
    command: uvicorn ws.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./backend/app:/code/app
      - ./backend/ws:/code/ws

  celery_email_worker:
    build: ./backend
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2 -Q emails
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-landing}:${POSTGRES_PASSWORD:-landing}@postgres:5432/${POSTGRES_DB:-landing}
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-noreply@landing-generator.local}
      PYTHONUNBUFFERED: "1"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./backend/app:/code/app
      - ./backend/worker:/code/worker

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/code/src
      - ./frontend/index.html:/code/index.html
      - ./frontend/vite.config.ts:/code/vite.config.ts

volumes:
  pgdata:
